name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        include:
          - os: ubuntu-latest
            artifact_name: aaau-linux
          - os: macos-latest
            artifact_name: aaau-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: '5.4.1'

      - name: Install dependencies
        run: opam install . --deps-only

      - name: Build binaries
        run: opam exec -- dune build --release bin/server.exe bin/client.exe

      - name: Prepare release artifacts
        run: |
          mkdir -p release
          cp _build/default/bin/server.exe release/aaau-server
          cp _build/default/bin/client.exe release/aaau
          cd release
          tar -czvf ${{ matrix.artifact_name }}.tar.gz aaau-server aaau

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: release/${{ matrix.artifact_name }}.tar.gz
          allowUpdates: true
          omitBodyDuringUpdate: true
          generateReleaseNotes: true
          token: ${{ secrets.GITHUB_TOKEN }}
